<!-- Left Panel: Context & Actions -->
<div class="flex-none w-[280px] flex flex-col items-center justify-between border-r-2 border-[#444] border-dashed pr-8">
    <div class="w-full flex flex-col items-center">
        <span class="console-label !mb-2">System Protocol</span>
        <h2 class="font-mono font-bold uppercase tracking-[4px] text-theme-text text-shadow-voxel-title text-center leading-tight" style="font-size: 3rem;">
            ${title.split(' ')[0]}<br/>
            <span class="text-theme-primary opacity-90">${title.split(' ')[1]}</span>
        </h2>
    </div>

    <div class="w-full flex flex-col gap-4">
        <p class="text-[0.7rem] text-[#888] font-mono text-center uppercase tracking-widest leading-relaxed">
            Authorized access only.<br/>
            Fleet telemetry data required for restoration.
        </p>
        <button id="btn-close-save-load" class="bg-btn-bg text-btn-text border border-btn-border rounded shadow-voxel-btn px-6 py-4 my-2 font-mono text-[1.2rem] font-bold uppercase cursor-pointer transition-all duration-100 w-full text-shadow-voxel-btn tracking-wider hover:bg-btn-hover hover:shadow-voxel-btn-hover hover:text-shadow-[0_0_8px_rgba(255,215,0,1)] active:shadow-voxel-btn-active active:translate-y-[2px]">Cancel</button>
    </div>
</div>

<!-- Right Panel: Data Slots -->
<div class="flex-grow flex flex-col pr-2 overflow-y-auto scrollbar-thin scrollbar-thumb-theme-primary scrollbar-track-transparent">
    <div class="flex flex-col gap-3 w-full items-center py-2">
        ${slotsHtml}
    </div>
</div>

<div id="confirm-overlay" class="absolute inset-0 z-[100] bg-[rgba(0,0,0,0.7)] backdrop-blur-sm items-center justify-center rounded" style="display:none;">
    <div class="confirm-dialog bg-[rgba(15,15,20,0.95)] border-4 border-theme-secondary rounded shadow-[0_10px_40px_rgba(0,0,0,1)] text-[#eee] px-10 py-8 pointer-events-auto relative text-shadow-voxel text-center max-w-[80%] min-w-[350px]">
        <p id="confirm-message" class="mb-6 text-xl">Overwrite this save?</p>
        <div class="flex gap-4 justify-center">
            <button id="confirm-yes" class="bg-btn-primary-bg text-white border border-theme-secondary rounded shadow-voxel-btn-primary px-8 py-3 font-mono text-[1.2rem] font-bold uppercase cursor-pointer transition-all duration-100 text-shadow-[0_0_5px_var(--color-secondary)] tracking-wider hover:bg-btn-primary-hover hover:shadow-[inset_0_0_15px_rgba(34,139,34,0.8),0_0_10px_rgba(34,139,34,0.5)] active:shadow-voxel-btn-active active:translate-y-[2px]">Yes</button>
            <button id="confirm-no" class="bg-btn-bg text-btn-text border border-btn-border rounded shadow-voxel-btn px-8 py-3 font-mono text-[1.2rem] font-bold uppercase cursor-pointer transition-all duration-100 text-shadow-voxel-btn tracking-wider hover:bg-btn-hover hover:shadow-voxel-btn-hover hover:text-shadow-[0_0_8px_rgba(255,215,0,1)] active:shadow-voxel-btn-active active:translate-y-[2px]">No</button>
        </div>
    </div>
</div>
