<h1 id="game-over-title" class="font-mono font-bold uppercase tracking-[2px] text-theme-text text-shadow-voxel-title text-5xl mb-2.5">Game Over</h1>
<p id="game-over-message" class="mb-[30px] text-2xl text-theme-secondary font-mono uppercase tracking-widest text-shadow-voxel"></p>
<div class="flex flex-col gap-2.5 w-full items-center">
    <button id="btn-gameover-restart" class="bg-btn-primary-bg text-white border border-theme-secondary rounded shadow-voxel-btn-primary px-10 py-4 my-2.5 font-mono text-[1.5rem] font-bold uppercase cursor-pointer transition-all duration-100 min-w-[200px] text-shadow-[0_0_5px_var(--color-secondary)] tracking-wider hover:bg-btn-primary-hover hover:shadow-[inset_0_0_15px_rgba(34,139,34,0.8),0_0_10px_rgba(34,139,34,0.5)] active:shadow-voxel-btn-active active:translate-y-[2px]">Play Again</button>
    <button id="btn-gameover-exit" class="bg-btn-bg text-btn-text border border-btn-border rounded shadow-voxel-btn px-10 py-4 my-2.5 font-mono text-[1.2rem] font-bold uppercase cursor-pointer transition-all duration-100 min-w-[200px] text-shadow-voxel-btn tracking-wider hover:bg-btn-hover hover:shadow-voxel-btn-hover hover:text-shadow-[0_0_8px_rgba(255,215,0,1)] active:shadow-voxel-btn-active active:translate-y-[2px]">Main Menu</button>
</div>
